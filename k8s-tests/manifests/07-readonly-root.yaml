apiVersion: v1
kind: Pod
metadata:
  name: ci-readonly
  labels:
    scenario: readonly
spec:
  restartPolicy: Never
  containers:
  - name: target
    image: alpine:latest
    command: ["sleep", "3600"]
    securityContext:
      readOnlyRootFilesystem: true
    volumeMounts:
    - name: tmp
      mountPath: /tmp
  volumes:
  - name: tmp
    emptyDir: {}
